variables:
  GIT_DEPTH: "0"

stages:
  - deploy

deploy-pages:
  stage: deploy
  image: alpine:3.20
  script:
    - apk add --no-cache git
    - sh .githooks/run-version-refresh.sh
    - mkdir -p public
    - cp index.html public/
    - cp LICENSE public/LICENSE
    - cp -r assets public/assets
    - cp -r src public/src
    - cp -r diagrams public/diagrams
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
