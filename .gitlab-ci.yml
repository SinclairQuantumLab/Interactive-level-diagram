variables:
  GIT_DEPTH: "0"

stages:
  - deploy

deploy-pages:
  stage: deploy
  image: alpine:3.20
  script:
    - apk add --no-cache git
    - sh .githooks/run-version-refresh.sh
    - mkdir -p public
    - cp index.html public/
    - cp LICENSE public/LICENSE
    - cp -r assets public/assets
    - cp -r src public/src
    - cp -r diagrams public/diagrams
    - |
      if [ -n "$CLOUDFLARE_WEB_ANALYTICS_TOKEN" ]; then
        SNIPPET="<!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{\"token\": \"$CLOUDFLARE_WEB_ANALYTICS_TOKEN\"}'></script><!-- End Cloudflare Web Analytics -->"
        awk -v snippet="$SNIPPET" '
          /<\/head>/ && !inserted {
            print snippet
            inserted = 1
          }
          { print }
        ' public/index.html > public/index.html.tmp
        mv public/index.html.tmp public/index.html
      fi
  artifacts:
    paths:
      - public
  pages: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
