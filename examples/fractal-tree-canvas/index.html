<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Fractal Tree</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-copy">
      <p class="eyebrow">Atomic Diagram Warmup</p>
      <h1>Move the cursor to grow a living fractal tree.</h1>
      <p class="description">
        Horizontal motion changes the branch spread. Vertical motion changes recursion depth,
        so the tree becomes denser as your cursor rises.
      </p>
      <div class="readout">
        <span>Depth</span>
        <strong id="depth-value">8</strong>
      </div>
    </section>
    <canvas id="tree-canvas" aria-label="Interactive fractal tree"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
