meta:
  id: yb171-ion
  title: Ytterbium-171 Ion
species:
  species: Yb
  atomic_mass_number: 171
  ionization_number: 1
  nuclear_spin: 0.5
  notes:
    - 'Ground-state configuration: [Xe]4f$^{14}$6$s$'
    - 'Singly ionized fermionic isotope with nuclear spin $I=1/2$.'
states:
  - id: 2S1/2
    j: 0.5
    energy: 0 THz\cite{Hur22}
    notation: $6s\,{}^{2}S_{1/2}$
    references:
      energy:
        - Hur22
      constants:
        - Fisk97
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: 12642.812118466(2) MHz\cite{Fisk97}
  - id: 2P1/2
    j: 0.5
    energy: 811.2937743(?) THz\cite{Hur22}
    notation: $6p\,{}^{2}P_{1/2}$
    references:
      energy:
        - Hur22
      constants:
        - Martensson94
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: 2104.9(1.3) MHz\cite{Martensson94}
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 8.12(2) ns\cite{Olmschenk09,Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 19.6(5) MHz\cite{Hur22}
      - section: Branching
      - label: '$2D_{3/2}$'
        value: '0.501(15)%\cite{Meyer12,Olmschenk07,Hur22}'
      - label: '$2F_{7/2}$'
        value: 'very small\cite{Meyer12,Olmschenk07,Hur22}'
    notes:
      - Centroid energy compiled from the $^{172}$Yb$^+$ 369 nm line in Table B.1 together with the $^{171,172}$ isotope shift in Table 19.2.\cite{Hur22}
  - id: 2D3/2
    j: 1.5
    energy: 688.3491747(?) THz\cite{Hur22}
    notation: $5d\,{}^{2}D_{3/2}$
    references:
      energy:
        - Hur22
      constants:
        - Olmschenk07
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: 430(10) MHz\cite{Olmschenk07,Hur22}
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 52.7(2.4) ms\cite{Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 3.02(14) Hz\cite{Hur22}
    notes:
      - Centroid energy follows the explicit Table 19.2 centroid entry for the $^{171}$Yb$^+$ 436 nm transition.\cite{Hur22}
  - id: 2D5/2
    j: 2.5
    energy: 729.4781866(?) THz\cite{Hur22}
    notation: $5d\,{}^{2}D_{5/2}$
    references:
      energy:
        - Hur22
      constants:
        - Tan21
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: '-63.368(1) MHz\cite{Tan21,Hur22}'
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 7.1(3) ms\cite{Yu00,Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 22.3(8) Hz\cite{Hur22}
      - section: Branching
      - label: '$2F_{7/2}$'
        value: '83(3)%\cite{Taylor97,Hur22}'
    notes:
      - Centroid energy inferred from the Table 19.2 $F=0 -> 2$ clock line together with the ground-state and $2D_{5/2}$ hyperfine shifts.\cite{Hur22,Fisk97,Tan21}
  - id: 2F7/2
    j: 3.5
    energy: 642.1140514(?) THz\cite{Hur22}
    notation: $4f^{13}6s^{2}\,{}^{2}F_{7/2}$
    references:
      energy:
        - Hur22
      constants:
        - Roman21
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: 905.13(3) MHz\cite{Roman21,Hur22}
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 1.58(8) yr\cite{Lange21,Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 3.19(16) nHz\cite{Lange21,Hur22}
    notes:
      - Centroid energy inferred from the Table 19.2 $F=0 -> 3$ E3 line together with the ground-state and $2F_{7/2}$ hyperfine shifts.\cite{Hur22,Fisk97,Roman21}
  - id: 3D[3/2]1/2
    j: 0.5
    energy: 1008.9162801(?) THz\cite{Hur22}
    notation: ${}^{3}D[3/2]_{1/2}$
    references:
      energy:
        - Hur22
      constants:
        - Olmschenk07
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: '-2209.5(1.1) MHz\cite{Olmschenk07,Hur22}'
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 37.7(5) ns\cite{Berends93,Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 4.22(6) MHz\cite{Hur22}
      - section: Branching
      - label: '$2S_{1/2}$'
        value: '98.2%\cite{Meyer12,Hur22}'
      - label: '$2D_{3/2}$'
        value: '1.8%\cite{Meyer12,Hur22}'
    notes:
      - Centroid energy derived from the measured $^{171}$Yb$^+$ 935 nm $F=1 -> 0$ line and the Table 19.1 hyperfine constants.\cite{Hur22,Olmschenk07}
  - id: 1D[3/2]3/2
    j: 1.5
    energy: 1036.5422636(?) THz\cite{Hur22}
    notation: ${}^{1}D[3/2]_{3/2}$
    references:
      energy:
        - Hur22
      constants:
        - Roman21
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    hyperfine_constants:
      a: 4440(5) MHz\cite{Roman21,Hur22}
    properties:
      - section: Lifetime
      - label: $\tau$
        value: 28.6(4) ns\cite{Berends93,Hur22}
      - label: $\frac{\Gamma}{2\pi}$
        value: 5.56(8) MHz\cite{Hur22}
      - section: Branching
      - label: '$2S_{1/2}$'
        value: '>=96%\cite{Hur22}'
      - label: '$2D_{5/2}$'
        value: '4.2%\cite{Hur22}'
      - label: '$2D_{3/2}$'
        value: '<=0.66%\cite{Hur22}'
    notes:
      - Centroid energy inferred from the measured 760 nm $F=3 -> 1$ and $F=4 -> 2$ lines together with Table 19.1 hyperfine constants.\cite{Hur22,Ransford20,Roman21}
  - id: 1D[5/2]5/2
    j: 2.5
    energy: 1111.5553214(?) THz\cite{Hur22}
    notation: ${}^{1}D[5/2]_{5/2}$
    references:
      energy:
        - Hur22
      gJCalculation:
        - Foot05
      gFCalculation:
        - Foot05
    notes:
      - Centroid energy estimated by combining the Table B.1 638 nm repumper frequency with the $^{171}$Yb$^+$ $2F_{7/2}$ centroid energy used in this diagram.\cite{Hur22}
      - The thesis tables referenced here do not compile a $^{171}$Yb$^+$ hyperfine constant for this state.\cite{Hur22}
transitions:
  - between:
      - 2S1/2[F=0]
      - 2S1/2[F=1]
    type: M1
    frequency: 12642.812118466(2) MHz\cite{Fisk97,Hur22}
    show:
      - frequency
    notes:
      - Microwave hyperfine clock / qubit splitting in $^{171}$Yb$^+$.\cite{Fisk97,Hur22}
  - between:
      - 2S1/2
      - 2P1/2
    type: E1
    show:
      - wavelength
      - type
    notes:
      - The centroid frequency for $^{171}$Yb$^+$ is obtained from the Table B.1 $^{172}$Yb$^+$ line together with the $^{171,172}$ isotope shift in Table 19.2.\cite{Hur22}
  - between:
      - 2S1/2[F=1]
      - 2P1/2[F=0]
    type: E1
    frequency: 811289034.9(?) MHz\cite{Hur22}
    show:
      - frequency
    notes:
      - Canonical 369 nm cooling branch for $^{171}$Yb$^+$.\cite{Hur22}
  - between:
      - 2S1/2[F=0]
      - 2P1/2[F=1]
    type: E1
    frequency: 811303782.6(?) MHz\cite{Hur22}
    show:
      - frequency
    notes:
      - 369 nm repump branch that clears the dark $F=0$ ground hyperfine state.\cite{Hur22}
  - between:
      - 2S1/2[F=1]
      - 2P1/2[F=1]
    type: E1
    frequency: 811291139.8(?) MHz\cite{Hur22}
    show:
      - frequency
    notes:
      - Useful 369 nm addressing branch when optical pumping among Zeeman / hyperfine sublevels is being discussed.\cite{Hur22}
  - between:
      - 2S1/2
      - 2D5/2
    type: E2
    show:
      - wavelength
      - type
    notes:
      - 411 nm E2 clock line alpha.\cite{Hur22}
  - between:
      - 2S1/2[F=0]
      - 2D5/2[F=2]
    type: E2
    frequency: 729487779.5662068(?) MHz\cite{Hur22}
    show:
      - frequency
    notes:
      - Table 19.2 gives this $^{171}$Yb$^+$ alpha-line address as an offset from the $^{172}$Yb$^+$ clock frequency.\cite{Hur22}
  - between:
      - 2S1/2
      - 2D3/2
    type: E2
    show:
      - wavelength
      - type
    notes:
      - 436 nm E2 clock line beta.\cite{Hur22}
  - between:
      - 2S1/2[F=0]
      - 2D3/2[F=2]
    type: E2
    frequency: 688358979.30930842(42) MHz\cite{Hur22,Godun14}
    show:
      - frequency
    notes:
      - Table 19.2 lists both the resolved $F=0 -> 2$ address and the inferred centroid for the beta line in $^{171}$Yb$^+$.\cite{Hur22}
  - between:
      - 2S1/2
      - 2F7/2
    type: E3
    show:
      - wavelength
      - type
    notes:
      - 467 nm E3 clock line gamma.\cite{Hur22}
  - between:
      - 2S1/2[F=0]
      - 2F7/2[F=3]
    type: E3
    frequency: 642121496.9726368(?) MHz\cite{Hur22}
    show:
      - frequency
    notes:
      - Table 19.2 gives the $^{171}$Yb$^+$ gamma-line address as an offset from the $^{172}$Yb$^+$ centroid frequency.\cite{Hur22}
  - between:
      - 2D3/2
      - 3D[3/2]1/2
    type: E1
    show:
      - wavelength
      - type
    notes:
      - 935 nm repumper from $2D_{3/2}$.\cite{Hur22}
  - between:
      - 2D3/2[F=1]
      - 3D[3/2]1/2[F=0]
    type: E1
    frequency: 320569300(70) MHz\cite{Hur22,McLoughlin11}
    show:
      - frequency
    notes:
      - Resolved $^{171}$Yb$^+$ 935 nm repump address listed explicitly in Table 19.2.\cite{Hur22}
  - between:
      - 2F7/2
      - 1D[3/2]3/2
    type: E1
    show:
      - wavelength
      - type
    notes:
      - 760 nm repumper from $2F_{7/2}$.\cite{Hur22}
  - between:
      - 2F7/2[F=3]
      - 1D[3/2]3/2[F=1]
    type: E1
    frequency: 394424700(?) MHz\cite{Hur22,Ransford20}
    show:
      - frequency
    notes:
      - Resolved 760 nm repump address listed in Table 19.2 for $^{171}$Yb$^+$.\cite{Hur22}
  - between:
      - 2F7/2[F=4]
      - 1D[3/2]3/2[F=2]
    type: E1
    frequency: 394429957(?) MHz\cite{Hur22,Ransford20}
    show:
      - frequency
    notes:
      - Second resolved 760 nm repump address listed in Table 19.2 for $^{171}$Yb$^+$.\cite{Hur22}
  - between:
      - 2F7/2
      - 1D[5/2]5/2
    type: E1
    show:
      - wavelength
      - type
    notes:
      - Older 638 nm repumper from $2F_{7/2}$.\cite{Counts20,Hur22}
