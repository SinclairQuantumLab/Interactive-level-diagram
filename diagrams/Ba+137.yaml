# Atomic species data only.
# Keep app layout, UI copy, storage, and rendering rules in the app code.

meta:
  id: ba137-ion
  title: Barium-137 Ion

species:
  species: Ba
  atomic_mass_number: 137
  ionization_number: 1
  nuclear_spin: 1.5
  notes:
    - 'Ground-state configuration: [Xe]6$s$'
    - 'Stable odd isotope with nuclear spin $I=3/2$ and natural abundance about 11.23%.'
    - 'Unlike $^{133}$Ba$^+$, this isotope has a nonzero nuclear quadrupole moment, so measured $B$ hyperfine constants are part of the standard low-lying-state data.'

states:
  - id: 6S1/2
    j: 0.5
    g_j: 2.00225664
    energy: '0 THz\cite{NISTBaII}'
    notation: '$6s\,{}^{2}S_{1/2}$'
    references:
      energy: [NISTBaII]
      constants: [Kaufman82, Hoffman14]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '4018.870833845(19) MHz\cite{Kaufman82}'

  - id: 6P1/2
    j: 0.5
    g_j: 0.6666666666666666
    energy: '607.426317511(?) THz\cite{NISTBaII}'
    notation: '$6p\,{}^{2}P_{1/2}$'
    references:
      energy: [NISTBaII]
      constants: [Hoffman14]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '743.7(3) MHz\cite{Hoffman14}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '7.855(10) ns\cite{Arnold19}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '20.262(26) MHz\cite{Arnold19}'
      - section: Branching
      - label: '$6S_{1/2}$'
        value: '0.731823(37)(20)\cite{Arnold19}'
      - label: '$5D_{3/2}$'
        value: '0.268177(37)(20)\cite{Arnold19}'

  - id: 6P3/2
    j: 1.5
    g_j: 1.3333333333333333
    energy: '658.116515417(?) THz\cite{NISTBaII}'
    notation: '$6p\,{}^{2}P_{3/2}$'
    references:
      energy: [NISTBaII]
      constants: [Hoffman14]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '127.2(2) MHz\cite{Hoffman14}'
      b: '92.5(2) MHz\cite{Hoffman14}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '6.321(?) ns\cite{Klose02}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '25.18(?) MHz\cite{Klose02}'
      - section: Branching
      - label: '$6S_{1/2}$'
        value: '0.741717(71)\cite{Zhang20}'
      - label: '$5D_{3/2}$'
        value: '0.028031(23)\cite{Zhang20}'
      - label: '$5D_{5/2}$'
        value: '0.230253(61)\cite{Zhang20}'

  - id: 5D3/2
    j: 1.5
    g_j: 0.8
    energy: '146.114407101(?) THz\cite{NISTBaII}'
    notation: '$5d\,{}^{2}D_{3/2}$'
    references:
      energy: [NISTBaII]
      constants: [Hoffman14]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '189.731494(17) MHz\cite{Hoffman14}'
      b: '44.5387936(10) MHz\cite{Hoffman14}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '89.4(15.6) s\cite{Gurell07}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '1.78(31) mHz\cite{Gurell07}'
      - section: Hyperfine
      - label: '$C$'
        value: 'about +0.036 kHz\cite{Hoffman12,Hoffman14}'
    notes:
      - 'The $5D_{3/2}$ manifold is a precision rf-spectroscopy system in $^{137}$Ba$^+$ and was used for nuclear-octupole studies.\cite{Hoffman12,Hoffman14}'

  - id: 5D5/2
    j: 2.5
    g_j: 1.2
    energy: '170.126433921(?) THz\cite{NISTBaII}'
    notation: '$5d\,{}^{2}D_{5/2}$'
    references:
      energy: [NISTBaII]
      constants: [Hoffman14, Kleczewski13]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-12.028(11) MHz\cite{Hoffman14,Kleczewski13}'
      b: '59.52(20) MHz\cite{Hoffman14,Kleczewski13}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '30.14(40) s\cite{Zhang20}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '5.28(7) mHz\cite{Zhang20}'
      - section: Hyperfine
      - label: '$C$'
        value: 'about -0.004 kHz\cite{Kleczewski13}'
    notes:
      - 'The small spacing between the upper $F$ manifolds leads to strong hyperfine-Zeeman mixing in low magnetic fields.\cite{Kleczewski13}'

transitions:
  - between: ['6S1/2[F=1]', '6S1/2[F=2]']
    type: M1
    frequency: '8.03774166769(4) GHz\cite{Kaufman82}'
    show: [frequency]
    notes:
      - 'Ground-state hyperfine qubit splitting of $^{137}$Ba$^+$.\cite{Kaufman82,Dietrich09}'

  - between: [6S1/2, 6P1/2]
    type: E1
    frequency: '607.426317511(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '493 nm cooling / detection line.'
      - '$^{137}$Ba$^+$ to $^{138}$Ba$^+$ isotope shift: +489(5) MHz.\cite{Hoffman14}'
      - 'Because $^{137}$Ba$^+$ has no $F=0$ ground manifold, Doppler cooling and repumping require more frequency components than in $^{133}$Ba$^+$.\cite{Dietrich09}'

  - between: ['6S1/2[F=1]', '6P1/2[F=2]']
    type: E1
    notes:
      - 'One of the canonical 493 nm cooling branches used in $^{137}$Ba$^+$.'

  - between: ['6S1/2[F=2]', '6P1/2[F=2]']
    type: E1
    notes:
      - 'Companion 493 nm branch needed to keep both ground hyperfine manifolds bright.'

  - between: [5D3/2, 6P1/2]
    type: E1
    frequency: '461.311910410(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '650 nm repump of the standard Ba$^+$ lambda system.'
      - '$^{137}$Ba$^+$ to $^{138}$Ba$^+$ isotope shift: +105(5) MHz.\cite{Hoffman14}'

  - between: [6S1/2, 6P3/2]
    type: E1
    frequency: '658.116515417(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '455 nm line used for shelving / optical-pumping through the $6P_{3/2}$ manifold.'
      - '$^{137}$Ba$^+$ to $^{138}$Ba$^+$ isotope shift: +473(3) MHz.\cite{Hoffman14}'

  - between: [5D3/2, 6P3/2]
    type: E1
    frequency: '512.002108316(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '585 nm auxiliary line coupling $5D_{3/2}$ to $6P_{3/2}$.'

  - between: [5D5/2, 6P3/2]
    type: E1
    frequency: '487.990081496(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '614 nm deshelving line from the metastable $5D_{5/2}$ manifold.'
      - '$^{137}$Ba$^+$ to $^{138}$Ba$^+$ isotope shift: +129(4) MHz.\cite{Hoffman14}'

  - between: [6S1/2, 5D5/2]
    type: E2
    frequency: '170.126433921(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '1762 nm electric-quadrupole optical-qubit line.'

  - between: [6S1/2, 5D3/2]
    type: E2
    frequency: '146.114407101(?) THz\cite{NISTBaII}'
    show: [wavelength, type]
    notes:
      - '2052 nm electric-quadrupole line connecting the ground state to $5D_{3/2}$.'

