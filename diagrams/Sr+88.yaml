# Atomic species data only.
# Keep app layout, UI copy, storage, and rendering rules in the app code.

meta:
  id: sr88-ion
  title: Strontium-88 Ion
  description: 'Basic $^{88}\mathrm{Sr}^{+}$ diagram for typical usage in AMO physics.'

species:
  species: Sr
  atomic_mass_number: 88
  ionization_number: 1
  nuclear_spin: 0
  notes:
    - 'Ground-state configuration: [Kr]5$s$'
    - 'Bosonic isotope with natural abundance about 82.58%.'
    - 'Because $I = 0$, the low-lying manifold has no hyperfine structure.'

states:
  - id: 5S1/2
    j: 0.5
    g_j: 2.00225664
    energy: '0 THz\cite{NISTSrII}'
    notation: '$5s\,{}^{2}S_{1/2}$'
    references:
      energy: [NISTSrII]
      gJCalculation: [Foot05]

  - id: 5P1/2
    j: 0.5
    g_j: 0.6666666666666666
    energy: '710.963510204(?) THz\cite{NISTSrII}'
    notation: '$5p\,{}^{2}P_{1/2}$'
    references:
      energy: [NISTSrII]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '7.39(7) ns\cite{Pinnington95}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '21.54(20) MHz\cite{Pinnington95}'
      - section: Branching
      - label: '$5S_{1/2}$'
        value: '0.94498(8)\cite{Zhang16}'
      - label: '$4D_{3/2}$'
        value: '0.05502(8)\cite{Zhang16}'

  - id: 5P3/2
    j: 1.5
    g_j: 1.3333333333333333
    energy: '734.990676543(?) THz\cite{NISTSrII}'
    notation: '$5p\,{}^{2}P_{3/2}$'
    references:
      energy: [NISTSrII]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '6.63(7) ns\cite{Pinnington95}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '24.01(25) MHz\cite{Pinnington95}'
      - section: Branching
      - label: '$5S_{1/2}$'
        value: '0.9406(3)\cite{Zhang16}'
      - label: '$4D_{3/2}$'
        value: '0.0063(3)\cite{Zhang16}'
      - label: '$4D_{5/2}$'
        value: '0.0531(2)\cite{Zhang16}'

  - id: 4D3/2
    j: 1.5
    g_j: 0.8
    energy: '436.374903940(?) THz\cite{NISTSrII}'
    notation: '$4d\,{}^{2}D_{3/2}$'
    references:
      energy: [NISTSrII]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '0.435(4) s\cite{Mannervik99}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '0.3659(34) Hz\cite{Mannervik99}'

  - id: 4D5/2
    j: 2.5
    g_j: 1.2
    energy: '444.77904409548549(19) THz\cite{Jian23}'
    notation: '$4d\,{}^{2}D_{5/2}$'
    references:
      energy: [Jian23]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '390.8(1.6) ms\cite{Letchumanan05}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '0.4073(17) Hz\cite{Letchumanan05}'

transitions:
  - between: [5S1/2, 5P1/2]
    type: E1
    frequency: '710.963510204(?) THz\cite{NISTSrII}'
    show: [wavelength, type]
    notes:
      - 'Canonical 422 nm Doppler-cooling and fluorescence line of $^{88}$Sr$^+$.'

  - between: [4D3/2, 5P1/2]
    type: E1
    frequency: '274.588606263(?) THz\cite{NISTSrII}'
    show: [wavelength, type]
    notes:
      - '1092 nm repump that closes the standard $5S_{1/2}$-$5P_{1/2}$-$4D_{3/2}$ lambda system.'

  - between: [5S1/2, 5P3/2]
    type: E1
    frequency: '734.990676543(?) THz\cite{NISTSrII}'
    show: [wavelength, type]
    notes:
      - '408 nm dipole line connecting the ground state to the $5P_{3/2}$ manifold.'

  - between: [4D3/2, 5P3/2]
    type: E1
    frequency: '298.615772602(?) THz\cite{NISTSrII}'
    show: [wavelength, type]
    notes:
      - '1004 nm auxiliary line linking the metastable $4D_{3/2}$ manifold to $5P_{3/2}$.'

  - between: [4D5/2, 5P3/2]
    type: E1
    frequency: '290.211632448(?) THz\cite{NISTSrII,Jian23}'
    show: [wavelength, type]
    notes:
      - '1033 nm quench / repump line from the metastable $4D_{5/2}$ clock state.'
      - 'Calculated from the cited $5P_{3/2}$ centroid and $4D_{5/2}$ clock energy.'

  - between: [5S1/2, 4D5/2]
    type: E2
    frequency: '444.77904409548549(19) THz\cite{Jian23}'
    show: [wavelength, type]
    notes:
      - '674 nm electric-quadrupole clock / optical-qubit transition of $^{88}$Sr$^+$.'

  - between: [5S1/2, 4D3/2]
    type: E2
    frequency: '436.374903940(?) THz\cite{NISTSrII}'
    show: [wavelength, type]
    notes:
      - '687 nm electric-quadrupole line connecting the ground state to $4D_{3/2}$.'

