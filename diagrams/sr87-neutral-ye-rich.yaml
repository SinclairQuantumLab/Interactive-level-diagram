      3S1:
        x: 40.75285029226279
        'y': 1.3146080739439867
    pinnedPanels: []
  tools:
    hide:
      enabled: false
    measure:
      enabled: false
      selection: []
      measurements: []
    move:
      enabled: false
  diagram:
    hyperfine:
      scaleByFineState:
        1S0: 1
        1P1: 15.135612484362087
        3P1: 0.3872576449216173
        3P0: 1
        3P2: 0.3019951720402016
        3S1: 0.13061708881318418
    transitions:
      labels:
        - {between: [1P1, 1S0], show: [wavelength], precision: {wavelength: 1, frequency: null}}
        - {between: ['1P1[F=11/2]', '1S0[F=9/2]'], show: [wavelength], precision: {wavelength: 6, frequency: null}}
        - {between: [1S0, 3P1], show: [wavelength], precision: {wavelength: 1, frequency: null}}
        - {between: ['1S0[F=9/2]', '3P1[F=11/2]'], show: [wavelength], precision: {wavelength: 6, frequency: null}}
        - {between: ['1S0[F=9/2]', '3P1[F=9/2]'], show: [wavelength], precision: {wavelength: 6, frequency: null}}
        - {between: ['1S0[F=9/2]', '3P1[F=7/2]'], show: [wavelength], precision: {wavelength: 6, frequency: null}}
        - {between: [1S0, 3P0], show: [wavelength, frequency], precision: {wavelength: 1, frequency: null}}
        - {between: [3P2, 3S1], show: [wavelength], precision: {wavelength: 1, frequency: null}}
        - {between: [3P0, 3S1], show: [wavelength], precision: {wavelength: 1, frequency: null}}
    magneticField:
      enabled: true
      visualScale: 1
      gauss: 1
      range:
        min: 0
        max: 10

