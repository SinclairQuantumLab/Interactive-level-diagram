# Steck-centered Rb-87 D-line reference diagram.
# In addition to the standard state/transition fields, this file uses:
# - state.g_j: optional dimensionless override for the fine-structure Lande g-factor
# - properties:
#     - section: Section heading
#     - label: Display label
#       value: Display value (supports inline \cite{...} references)

meta:
  id: rb87-dline-steck
  title: Rubidium-87 D-Line Reference
  description: "Rubidium-87 D-line reference diagram based on Steck data, including hyperfine strengths."

species:
  species: Rb
  atomic_mass_number: 87
  ionization_number: 0
  nuclear_spin: 1.5
  notes:
    - 'Ground-state configuration: [Kr]5$s^1$'
    - 'Relative natural abundance: 27.83(2)%\cite{Ste03}'

states:
  - id: 5S1/2
    j: 0.5
    g_j: '2.00233113(20)\cite{Ari77}'
    energy: '0 THz\cite{Ste03}'
    notation: '$5s\,{}^{2}S_{1/2}$'
    references:
      energy: [Ste03]
      constants: [Bize99]
      gFCalculation: [Ste03]
    hyperfine_constants:
      a: '3417.34130545215(5) MHz\cite{Bize99}'
    properties:
      - section: Energy
      - label: Ionization limit
        value: '33690.8048(2) cm$^{-1}$ = 4.1771270(2) eV\cite{Ste03}'
      - section: Polarizability
      - label: 'Scalar $\frac{\alpha_\mathrm{DC}^{(0)}}{h}$'
        value: '0.0794(16) Hz/(V/cm)$^2$\cite{Mil00,Ste03}'

  - id: 5P1/2
    j: 0.5
    g_j: '0.666\cite{Ste03}'
    energy: '377.1074635(4) THz\cite{Bar91}'
    notation: '$5p\,{}^{2}P_{1/2}$'
    references:
      energy: [Bar91]
      constants: [Bar91]
      gFCalculation: [Ste03]
    hyperfine_constants:
      a: '408.328(15) MHz\cite{Bar91}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '27.70(4) ns\cite{Volz96,Ste03}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '5.746(8) MHz\cite{Volz96,Ste03}'
    notes:
      - 'Steck lists $g_J \approx 0.666$ for this manifold and notes no direct experimental measurement.\cite{Ste03}'

  - id: 5P3/2
    j: 1.5
    g_j: '1.3362(13)\cite{Ari77}'
    energy: '384.2304844685(62) THz\cite{Ye96}'
    notation: '$5p\,{}^{2}P_{3/2}$'
    references:
      energy: [Ye96]
      constants: [Ye96]
      gFCalculation: [Ste03]
    hyperfine_constants:
      a: '84.7185(20) MHz\cite{Ye96}'
      b: '12.4965(37) MHz\cite{Ye96}'
    properties:
      - section: Polarizability
      - label: 'Tensor $\frac{\alpha_\mathrm{DC}^{(2)}}{h}$'
        value: '-0.0406(8) Hz/(V/cm)$^2$\cite{Kre97,Ste03}'
      - section: Lifetime
      - label: '$\tau$'
        value: '26.24(4) ns\cite{Volz96,Ste03}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '6.065(9) MHz\cite{Volz96,Ste03}'

transitions:
  - between: ['5S1/2[F=1]', '5S1/2[F=2]']
    type: M1
    frequency: '6.83468261090429(9) GHz\cite{Bize99}'
    show: [frequency]
    properties:
      - section: Zeeman
      - label: Quadratic coefficient
        value: '2pi x 575.15 Hz/G$^2$\cite{Ste03}'
    notes:
      - 'The $m_F=0 \leftrightarrow m_F=0$ branch is the first-order field-insensitive clock transition.\cite{Ste03}'

  - between: [5S1/2, 5P1/2]
    type: E1
    strength: '2.992(3) ea0\cite{Ste03}'
    frequency: '377.1074635(4) THz\cite{Bar91}'
    show: [wavelength, strength]
    properties:
      - section: Line data
      - label: Energy
        value: '1.55959099(6) eV\cite{Bar91,Ste03}'
      - label: Air wavelength
        value: '794.76569 nm\cite{Ste03}'
      - label: Wavenumber
        value: '12578.950985(13) cm$^{-1}$\cite{Bar91,Ste03}'
      - section: Polarizability
      - label: 'Scalar $\frac{\alpha_\mathrm{DC}^{(0)}}{h}$'
        value: '0.122306(16) Hz/(V/cm)$^2$\cite{Mil94,Ste03}'
      - section: Radiative properties
      - label: $\tau$
        value: '27.70(4) ns\cite{Volz96,Ste03}'
      - label: '$\Gamma$'
        value: '36.10(5) x 10^6 s$^{-1}$\cite{Volz96,Ste03}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '5.746(8) MHz\cite{Volz96,Ste03}'
      - label: Oscillator strength
        value: '0.3420(14)\cite{Ste03}'
      - section: Recoil
      - label: '$v_\mathrm{recoil}$'
        value: '5.7754 mm/s\cite{Ste03}'
      - label: '$\frac{E_\mathrm{recoil}}{h}$'
        value: '3.6325 kHz\cite{Ste03}'
      - label: '$T_\mathrm{recoil}$'
        value: '348.66 nK\cite{Ste03}'

  - between: [5S1/2, 5P3/2]
    type: E1
    strength: '4.227(5) ea0\cite{Ste03}'
    frequency: '384.2304844685(62) THz\cite{Ye96}'
    show: [wavelength, strength]
    properties:
      - section: Line data
      - label: Energy
        value: '1.589049439(58) eV\cite{Ye96,Ste03}'
      - label: Air wavelength
        value: '780.03200 nm\cite{Ste03}'
      - label: Wavenumber
        value: '12816.54938993(21) cm$^{-1}$\cite{Ye96,Ste03}'
      - section: Polarizability
      - label: 'Scalar $\frac{\alpha_\mathrm{DC}^{(0)}}{h}$'
        value: '0.1340(8) Hz/(V/cm)$^2$\cite{Kre97,Ste03}'
      - section: Radiative properties
      - label: $\tau$
        value: '26.24(4) ns\cite{Volz96,Ste03}'
      - label: '$\Gamma$'
        value: '38.11(6) x 10^6 s$^{-1}$\cite{Volz96,Ste03}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '6.065(9) MHz\cite{Volz96,Ste03}'
      - label: Oscillator strength
        value: '0.6956(15)\cite{Ste03}'
      - section: Recoil
      - label: '$v_\mathrm{recoil}$'
        value: '5.8845 mm/s\cite{Ste03}'
      - label: '$\frac{E_\mathrm{recoil}}{h}$'
        value: '3.7710 kHz\cite{Ste03}'
      - label: '$T_\mathrm{recoil}$'
        value: '361.96 nK\cite{Ste03}'

  - between: ['5S1/2[F=1]', '5P1/2[F=1]']
    type: E1
    strength: '1/6\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Bar91]

  - between: ['5S1/2[F=1]', '5P1/2[F=2]']
    type: E1
    strength: '5/6\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Bar91]

  - between: ['5S1/2[F=2]', '5P1/2[F=1]']
    type: E1
    strength: '1/2\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Bar91]

  - between: ['5S1/2[F=2]', '5P1/2[F=2]']
    type: E1
    strength: '1/2\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Bar91]

  - between: ['5S1/2[F=1]', '5P3/2[F=0]']
    type: E1
    strength: '1/6\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=1]', '5P3/2[F=1]']
    type: E1
    strength: '5/12\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=1]', '5P3/2[F=2]']
    type: E1
    strength: '5/12\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=2]', '5P3/2[F=1]']
    type: E1
    strength: '1/20\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=2]', '5P3/2[F=2]']
    type: E1
    strength: '1/4\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=2]', '5P3/2[F=3]']
    type: E1
    strength: '7/10\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]

  - between: ['5S1/2[F=2,mF=2]', '5P3/2[F=3,mF=3]']
    type: E1
    strength: '2.989(3) ea0\cite{Ste03}'
    show: [strength]
    references:
      derived: [Bize99, Ye96]
    properties:
      - section: Line data
      - label: Saturation intensity
        value: '1.669(2) mW/cm$^2$\cite{Ste03}'
      - label: Resonant cross section
        value: '2.907 x 10$^{-9}$ cm$^2$\cite{Ste03}'
    notes:
      - 'Stretched $\sigma^+$ D2 cycling transition.\cite{Ste03}'

