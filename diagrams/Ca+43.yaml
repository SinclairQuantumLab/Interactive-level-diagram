# Atomic species data only.
# Keep app layout, UI copy, storage, and rendering rules in the app code.

meta:
  id: ca43-ion
  title: Calcium-43 Ion
  description: 'Basic $^{43}\mathrm{Ca}^{+}$ diagram for typical trapped-ion AMO usage.'

species:
  species: Ca
  atomic_mass_number: 43
  ionization_number: 1
  nuclear_spin: 3.5
  notes:
    - 'Ground-state configuration: [Ar]4$s$'
    - 'Stable fermionic isotope with natural abundance about 0.135%.'
    - 'Fine-state centroids follow generic Ca II term energies; measured $^{43}$Ca$^+$ hyperfine structure is included explicitly.'

states:
  - id: 4S1/2
    j: 0.5
    g_j: 2.00225664
    energy: '0 THz\cite{NISTCaII}'
    notation: '$4s\,{}^{2}S_{1/2}$'
    references:
      energy: [NISTCaII]
      constants: [Arbes94, Benhelm07]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-806.4020716(1) MHz\cite{Arbes94}'
    hyperfine:
      - f: 3
        rel: '1814.4046611(18) MHz\cite{Benhelm07}'
      - f: 4
        rel: '-1411.2036253(14) MHz\cite{Benhelm07}'

  - id: 4P1/2
    j: 0.5
    g_j: 0.6666666666666666
    energy: '755.222710197(?) THz\cite{NISTCaII}'
    notation: '$4p\,{}^{2}P_{1/2}$'
    references:
      energy: [NISTCaII]
      constants: [Kurth95, Benhelm07]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-142(8) MHz\cite{Kurth95}'
    hyperfine:
      - f: 3
        rel: '327.2(2) MHz\cite{Benhelm07}'
      - f: 4
        rel: '-254.5(2) MHz\cite{Benhelm07}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '6.904(26) ns\cite{Hettrich15}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '23.05(9) MHz\cite{Hettrich15}'
      - section: Branching
      - label: '$4S_{1/2}$'
        value: '0.93565(7)\cite{Ramm13}'
      - label: '$3D_{3/2}$'
        value: '0.06435(7)\cite{Ramm13}'

  - id: 4P3/2
    j: 1.5
    g_j: 1.3333333333333333
    energy: '761.904964169(?) THz\cite{NISTCaII}'
    notation: '$4p\,{}^{2}P_{3/2}$'
    references:
      energy: [NISTCaII]
      constants: [Silverans91, Benhelm07]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-31.0(2) MHz\cite{Silverans91}'
    hyperfine:
      - f: 2
        rel: '205.6(1.6) MHz\cite{Benhelm07}'
      - f: 3
        rel: '117.5(8) MHz\cite{Benhelm07}'
      - f: 4
        rel: '-4.5(8) MHz\cite{Benhelm07}'
      - f: 5
        rel: '-164.5(11) MHz\cite{Benhelm07}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '6.639(42) ns\cite{Meir20}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '23.97(15) MHz\cite{Meir20}'
      - section: Branching
      - label: '$4S_{1/2}$'
        value: '0.9347(3)\cite{Gerritsma08}'
      - label: '$3D_{3/2}$'
        value: '0.00661(4)\cite{Gerritsma08}'
      - label: '$3D_{5/2}$'
        value: '0.0587(2)\cite{Gerritsma08}'

  - id: 3D3/2
    j: 1.5
    g_j: 0.8
    energy: '409.222701019(?) THz\cite{NISTCaII}'
    notation: '$3d\,{}^{2}D_{3/2}$'
    references:
      energy: [NISTCaII]
      constants: [Kurth95, Benhelm07]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-48.3(16) MHz\cite{Kurth95}'
    hyperfine:
      - f: 2
        rel: '317.3(17) MHz\cite{Benhelm07}'
      - f: 3
        rel: '178.0(8) MHz\cite{Benhelm07}'
      - f: 4
        rel: '-10.1(9) MHz\cite{Benhelm07}'
      - f: 5
        rel: '-249.3(12) MHz\cite{Benhelm07}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '1.176(11) s\cite{Kreuter05}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '0.1353(13) Hz\cite{Kreuter05}'

  - id: 3D5/2
    j: 2.5
    g_j: 1.2
    energy: '411.042141447(?) THz\cite{NISTCaII}'
    notation: '$3d\,{}^{2}D_{5/2}$'
    references:
      energy: [NISTCaII]
      constants: [Benhelm07]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '-3.8931(2) MHz\cite{Benhelm07}'
      b: '-4.241(4) MHz\cite{Benhelm07}'
    hyperfine:
      - f: 1
        rel: '41.525(3) MHz\cite{Benhelm07}'
      - f: 2
        rel: '34.951(2) MHz\cite{Benhelm07}'
      - f: 3
        rel: '24.635(1) MHz\cite{Benhelm07}'
      - f: 4
        rel: '10.032(1) MHz\cite{Benhelm07}'
      - f: 5
        rel: '-9.585(1) MHz\cite{Benhelm07}'
      - f: 6
        rel: '-35.125(2) MHz\cite{Benhelm07}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '1.168(7) s\cite{Kreuter05}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '0.1363(8) Hz\cite{Kreuter05}'

transitions:
  - between: ['4S1/2[F=3]', '4S1/2[F=4]']
    type: M1
    frequency: '3.2256082864(1) GHz\cite{Arbes94}'
    show: [frequency]
    notes:
      - 'Ground-state hyperfine qubit splitting of $^{43}$Ca$^+$.\cite{Arbes94}'

  - between: [4S1/2, 4P1/2]
    type: E1
    frequency: '755.222710197(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '397 nm cooling / fluorescence line of Ca II.'

  - between: ['4S1/2[F=4]', '4P1/2[F=4]']
    type: E1
    notes:
      - 'Canonical 397 nm cooling branch in $^{43}$Ca$^+$ hyperfine cooling schemes.'

  - between: ['4S1/2[F=3]', '4P1/2[F=4]']
    type: E1
    notes:
      - '397 nm repump branch that returns population from the dark $F=3$ ground manifold.'

  - between: [4S1/2, 4P3/2]
    type: E1
    frequency: '761.904964169(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '393 nm dipole line used for optical pumping and shelving protocols.'

  - between: [3D3/2, 4P1/2]
    type: E1
    frequency: '346.000009178(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '866 nm repump from the metastable $3D_{3/2}$ manifold.'

  - between: [3D3/2, 4P3/2]
    type: E1
    frequency: '352.682263150(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '850 nm auxiliary repump / shelving line from $3D_{3/2}$.'

  - between: [3D5/2, 4P3/2]
    type: E1
    frequency: '350.862822722(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '854 nm quench / repump line from the metastable $3D_{5/2}$ manifold.'

  - between: [4S1/2, 3D5/2]
    type: E2
    frequency: '411.042141447(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '729 nm electric-quadrupole clock / optical-qubit line.'
      - '$^{43}$Ca$^+$ to $^{40}$Ca$^+$ isotope shift on this transition: 4134.713(5) MHz.\cite{Benhelm07}'

  - between: ['4S1/2[F=4]', '3D5/2[F=6]']
    type: E2
    notes:
      - 'Commonly addressed hyperfine branch of the 729 nm quadrupole transition.'

  - between: [4S1/2, 3D3/2]
    type: E2
    frequency: '409.222701019(?) THz\cite{NISTCaII}'
    show: [wavelength, type]
    notes:
      - '732.6 nm electric-quadrupole line connecting the ground state to $3D_{3/2}$.'

