# Atomic species data only.
# Keep app layout, UI copy, storage, and rendering rules in the app code.

meta:
  id: sr87-neutral
  title: Strontium-87 Neutral Atom

species:
  species: Sr
  atomic_mass_number: 87
  ionization_number: 0
  nuclear_spin: 4.5
  notes:
    - 'Ground-state configuration: [Kr]5$s^2$'
    - 'Fermionic isotope with nuclear spin $I=9/2$.'

states:
  - id: 1S0
    j: 0
    g_j: 0
    energy: '0 THz\cite{NISTSrI}'
    notation: '$5s^2\,{}^{1}S_0$'
    references:
      energy: [NISTSrI]
      constants: [Boyd07Thesis]
    hyperfine_constants:
      a: '-1000.5 MHz\cite{Boyd07Thesis}'

  - id: 1P1
    j: 1
    g_j: 1
    energy: '650.504125364876(?) THz\cite{NISTSrI}'
    notation: '$5s5p\,{}^{1}P_1$'
    references:
      energy: [NISTSrI]
      constants: [Boyd07Thesis]
    hyperfine_constants:
      a: '-3.4(4) MHz\cite{Boyd07Thesis}'
      b: '39(4) MHz\cite{Boyd07Thesis}'
    properties:
      - section: Lifetime
      - label: $\frac{\Gamma}{2\pi}$
        value: 'about 32 MHz\cite{Ludlow15}'

  - id: 3P1
    j: 1
    g_j: 1.5
    energy: '434.829503798476(?) THz\cite{NISTSrI}'
    notation: '$5s5p\,{}^{3}P_1$'
    references:
      energy: [NISTSrI]
      constants: [Boyd07PRA, Boyd07Thesis]
    hyperfine_constants:
      a: '-260.084(10) MHz\cite{Boyd07PRA,Boyd07Thesis}'
      b: '-35.658(6) MHz\cite{Boyd07PRA,Boyd07Thesis}'
    properties:
      - section: Lifetime
      - label: $\tau$
        value: '21.326(33) $\mu$s\cite{Aeppli24}'
      - label: $\frac{\Gamma}{2\pi}$
        value: '7.463(12) kHz\cite{Aeppli24}'

  - id: 3P0
    j: 0
    g_j: 0
    energy: '429.22800422987365(37) THz\cite{Campbell08}'
    notation: '$5s5p\,{}^{3}P_0$'
    references:
      energy: [Campbell08]
      constants: [Boyd07Thesis]
    hyperfine_constants:
      a: '-1094(1) MHz\cite{Boyd07Thesis}'
    properties:
      - section: Lifetime
      - label: $\tau$
        value: '174(28) s\cite{Kim25}'
      - label: $\frac{\Gamma}{2\pi}$
        value: '0.915(147) mHz\cite{Kim25}'

  - id: 3P2
    j: 2
    g_j: 1.5
    energy: '446.647682243785(?) THz\cite{NISTSrI}'
    notation: '$5s5p\,{}^{3}P_2$'
    references:
      energy: [NISTSrI]
      constants: [Boyd07PRA, Boyd07Thesis]
    hyperfine_constants:
      a: '-212.765(1) MHz\cite{Boyd07PRA,Boyd07Thesis}'
      b: '67.34(15) MHz\cite{Boyd07PRA,Boyd07Thesis}'

  - id: 1D2
    j: 2
    g_j: 1
    energy: '604.072809096260(?) THz\cite{NISTSrI}'
    notation: '$5s4d\,{}^{1}D_2$'
    references:
      energy: [NISTSrI]
      constants: [Mani11]
    hyperfine_constants:
      a: '27.145(?) MHz\cite{Mani11}'
    notes:
      - 'Intermediate state in the $^1P_1 \to {}^1D_2 \to {}^3P_{1,2}$ blue-MOT leak chain; directly optically pumped in recent cooling / imaging work.\cite{Samland24}'

  - id: 3D1
    j: 1
    g_j: '0.4995(88)\cite{Zhang20}'
    energy: '544.394803319965(?) THz\cite{NISTSrI}'
    notation: '$5s4d\,{}^{3}D_1$'
    references:
      energy: [NISTSrI]
      constants: [Mani11]
    hyperfine_constants:
      a: '151.586(?) MHz\cite{Mani11}'
    properties:
      - section: Lifetime
      - label: $\tau$
        value: '2.1560(52) $\mu$s\cite{Aeppli24}'
      - label: $\frac{\Gamma}{2\pi}$
        value: '73.82(18) kHz\cite{Aeppli24}'
      - section: Branching
      - label: '$^3P_0$'
        value: '59.4%\cite{Zhang20}'
      - label: '$^3P_1$'
        value: '38.7%\cite{Zhang20}'
      - label: '$^3P_2$'
        value: '1.9%\cite{Zhang20}'
    notes:
      - '$^{87}$Sr spectroscopy on the 2603 nm line resolves the $F''=7/2, 9/2, 11/2$ hyperfine manifold and addresses each branch individually.\cite{Aeppli24}'

  - id: 3D2
    j: 2
    g_j: 1.1666666666666667
    energy: '546.185733484811(?) THz\cite{NISTSrI}'
    notation: '$5s4d\,{}^{3}D_2$'
    references:
      energy: [NISTSrI]
      constants: [Mani11]
    hyperfine_constants:
      a: '-49.654(?) MHz\cite{Mani11}'
    notes:
      - 'Used in 3.01 $\mu$m repumping / spectroscopy of the metastable $^3P_2$ reservoir.\cite{Mickelson09}'

  - id: 3D3
    j: 3
    g_j: 1.3333333333333333
    energy: '549.197808268829(?) THz\cite{NISTSrI}'
    notation: '$5s4d\,{}^{3}D_3$'
    references:
      energy: [NISTSrI]
      constants: [Mani11]
    hyperfine_constants:
      a: '-133.778(?) MHz\cite{Mani11}'
    notes:
      - 'Upper state of the 2.92 $\mu$m metastable MOT transition from $^3P_2$.\cite{Hobson20}'

  - id: 3S1
    j: 1
    g_j: 2.00231930436256
    energy: '870.561173040811(?) THz\cite{NISTSrI}'
    notation: '$5s6s\,{}^{3}S_1$'
    references:
      energy: [NISTSrI]
      constants: [Boyd07Thesis]
    hyperfine_constants:
      a: '-542.0(1) MHz\cite{Boyd07Thesis}'
      b: '-0.1(5) MHz\cite{Boyd07Thesis}'

transitions:
  - between: [1S0, 1P1]
    type: E1
    frequency: '650.504125364876(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - 'Broad first-stage cooling / fluorescence line at 461 nm.\cite{Ludlow15}'

  - between: ['1S0[F=9/2]', '1P1[F=11/2]']
    type: E1
    frequency: '650.504119814876(?) THz\cite{Boyd07Thesis,NISTSrI}'
    show: [wavelength]
    notes:
      - 'Principal hyperfine branch used for 461 nm cooling in $^{87}$Sr.\cite{Ludlow08,Boyd07Thesis}'

  - between: [1S0, 3P1]
    type: E1
    frequency: '434.829503798476(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - 'Narrow-line 689 nm transition used for second-stage cooling, stirring, and optical pumping.\cite{Ludlow08,Ludlow15}'

  - between: ['1S0[F=9/2]', '3P1[F=11/2]']
    type: E1
    frequency: '434.828324505976(?) THz\cite{Boyd07PRA,Boyd07Thesis,NISTSrI}'
    show: [wavelength]
    notes:
      - 'Restoring branch of the 689 nm MOT.\cite{Ludlow08}'

  - between: ['1S0[F=9/2]', '3P1[F=9/2]']
    type: E1
    frequency: '434.829787654476(?) THz\cite{Boyd07PRA,Boyd07Thesis,NISTSrI}'
    show: [wavelength]
    notes:
      - 'Red-MOT stirring branch.\cite{Ludlow08}'

  - between: ['1S0[F=9/2]', '3P1[F=7/2]']
    type: E1
    frequency: '434.830917917226(?) THz\cite{Boyd07PRA,Boyd07Thesis,NISTSrI}'
    show: [wavelength]
    notes:
      - '$\pi$-polarized optical-pumping branch used to accumulate population in the stretched $m_F=\pm 9/2$ ground states.\cite{Ludlow08}'

  - between: [1S0, 3P0]
    type: E1
    frequency: '429.22800422987365(37) THz\cite{Campbell08}'
    show: [wavelength, type]
    notes:
      - '698 nm optical clock transition.\cite{Campbell08,Ludlow15}'

  - between: [1P1, 1D2]
    type: E1
    frequency: '46.431316268616(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - 'Infrared branch of the blue-MOT leak network through $^1D_2$.\cite{Samland24}'

  - between: [1D2, 3P1]
    type: E1
    frequency: '169.243305297784(?) THz\cite{NISTSrI}'
    show: [wavelength, type]

  - between: [1D2, 3P2]
    type: E1
    frequency: '157.425126852475(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - 'Triplet-return branch of the $^1D_2$ leak pathway toward the metastable manifold.\cite{Samland24}'

  - between: [3P0, 3D1]
    type: E1
    frequency: '115.166264240467(?) THz\cite{Aeppli24}'
    show: [wavelength, type]
    properties:
      - section: Radiative properties
      - label: '$D$'
        value: '2.6906(21) a.u.\cite{Aeppli24}'
      - label: '$A_{ki}$'
        value: '2.7619(64) $\times$ 10$^5$ s$^{-1}$\cite{Aeppli24}'
    notes:
      - 'Clock-relevant 2603 nm line from $^3P_0(F=9/2)$ to the resolved $^3D_1(F''=7/2,9/2,11/2)$ manifold.\cite{Aeppli24}'

  - between: [3P1, 3D1]
    type: E1
    frequency: '109.565299521489(?) THz\cite{NISTSrI}'
    show: [wavelength, type]

  - between: [3P1, 3D2]
    type: E1
    frequency: '111.356229686335(?) THz\cite{NISTSrI}'
    show: [wavelength, type]

  - between: [3P2, 3D1]
    type: E1
    frequency: '97.747121076180(?) THz\cite{NISTSrI}'
    show: [wavelength, type]

  - between: [3P2, 3D2]
    type: E1
    frequency: '99.538051241026(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - '3.01 $\mu$m repumping / spectroscopy line from the metastable $^3P_2$ reservoir.\cite{Mickelson09}'

  - between: [3P2, 3D3]
    type: E1
    frequency: '102.550126025044(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - '2.92 $\mu$m metastable MOT transition used for optical-lattice-clock loading.\cite{Hobson20}'

  - between: [3P2, 3S1]
    type: E1
    frequency: '423.913490797026(?) THz\cite{NISTSrI}'
    show: [wavelength, type]
    notes:
      - '707 nm repumper that empties the metastable $^3P_2$ reservoir.\cite{Ludlow08,Ludlow15}'

  - between: [3P0, 3S1]
    type: E1
    frequency: '441.333168810937(?) THz\cite{Campbell08,NISTSrI}'
    show: [wavelength, type]
    notes:
      - '679 nm repumper that clears the $^3P_0$ dark state.\cite{Ludlow08,Ludlow15}'

