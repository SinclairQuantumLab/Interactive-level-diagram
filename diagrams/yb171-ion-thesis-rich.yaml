    - between: ['2D5/2[F=2]', '2S1/2[F=0]']
    - between: ['2F7/2[F=3]', '2S1/2[F=0]']
    - between: ['2P1/2[F=1]', '2S1/2[F=0]']
    - between: ['2D3/2[F=1]', '3D[3/2]1/2[F=0]']
    - between: ['1D[3/2]3/2[F=1]', '2F7/2[F=3]']
    - between: ['1D[3/2]3/2[F=2]', '2F7/2[F=4]']
    - between: ['2P1/2[F=1]', '2S1/2[F=1]']
  controls:
    hyperfineScaleByFineState:
      2S1/2: 0.12133888504649774
      2P1/2: 0.5445026528424212
      2D3/2: 1
      2D5/2: 1
      2F7/2: 0.3341950400261143
      3D[3/2]1/2: 0.3250872973854344
      1D[3/2]3/2: 0.09204495717531712
      1D[5/2]5/2: 1
    transitionLabels:
      - {between: ['2S1/2[F=0]', '2S1/2[F=1]'], show: [frequency], precision: {wavelength: null, frequency: null}}
      - {between: [2P1/2, 2S1/2], show: [wavelength, type], precision: {wavelength: 1, frequency: null}}
      - {between: ['2P1/2[F=0]', '2S1/2[F=1]'], show: [wavelength], precision: {wavelength: null, frequency: null}}
      - {between: ['2P1/2[F=1]', '2S1/2[F=0]'], show: [wavelength], precision: {wavelength: 1, frequency: null}}
      - {between: ['2P1/2[F=1]', '2S1/2[F=1]'], show: [wavelength], precision: {wavelength: null, frequency: null}}
      - {between: [2D5/2, 2S1/2], show: [wavelength, type], precision: {wavelength: 1, frequency: null}}
      - {between: ['2D5/2[F=2]', '2S1/2[F=0]'], show: [wavelength], precision: {wavelength: null, frequency: null}}
      - {between: [2D3/2, 2S1/2], show: [wavelength, type], precision: {wavelength: 1, frequency: null}}
      - {between: ['2D3/2[F=2]', '2S1/2[F=0]'], show: [wavelength], precision: {wavelength: null, frequency: null}}
      - {between: [2F7/2, 2S1/2], show: [wavelength, type], precision: {wavelength: 1, frequency: null}}
