# Atomic species data only.
# Keep app layout, UI copy, storage, and rendering rules in the app code.

meta:
  id: cs133-neutral
  title: Cesium-133 Neutral Atom
  description: "Cesium-133 neutral atom diagram with low-lying hyperfine structure and optical transitions."

species:
  species: Cs
  atomic_mass_number: 133
  ionization_number: 0
  nuclear_spin: 3.5
  notes:
    - 'Ground-state configuration: [Xe]6$s^1$'
    - 'Only stable naturally occurring isotope: $^{133}$Cs'

states:
  - id: 6S1/2
    j: 0.5
    g_j: '2.00254032(20)\cite{Steck25}'
    energy: '0 THz\cite{NISTCsI}'
    notation: '$6s\,{}^{2}S_{1/2}$'
    references:
      energy: [NISTCsI]
      constants: [Steck25]
      gFCalculation: [Steck25]
    hyperfine_constants:
      a: '2298.1579425 MHz\cite{Steck25}'

  - id: 6P1/2
    j: 0.5
    g_j: '0.66590(9)\cite{Steck25}'
    energy: '335.1160487481(24) THz\cite{Gerginov06}'
    notation: '$6p\,{}^{2}P_{1/2}$'
    references:
      energy: [Gerginov06]
      constants: [Gerginov06]
      gFCalculation: [Steck25]
    hyperfine_constants:
      a: '291.9309(12) MHz\cite{Gerginov06}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '34.72(6) ns\cite{Steck25}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '4.584(8) MHz\cite{Steck25}'

  - id: 6P3/2
    j: 1.5
    g_j: '1.33408749(52)\cite{Steck25}'
    energy: '351.72571850(11) THz\cite{Udem00}'
    notation: '$6p\,{}^{2}P_{3/2}$'
    references:
      energy: [Udem00]
      constants: [Gerginov03]
      gFCalculation: [Steck25]
    hyperfine_constants:
      a: '50.27546(86) MHz\cite{Gerginov03}'
      b: '-0.4934(17) MHz\cite{Gerginov03}'
    hyperfine:
      - f: 2
        rel: '-339.7128(39) MHz\cite{Gerginov03}'
      - f: 3
        rel: '-188.4885(13) MHz\cite{Gerginov03}'
      - f: 4
        rel: '12.79851(82) MHz\cite{Gerginov03}'
      - f: 5
        rel: '263.8906(24) MHz\cite{Gerginov03}'
    properties:
      - section: Hyperfine
      - label: '$C$'
        value: '0.560(7) kHz\cite{Gerginov03}'
      - section: Lifetime
      - label: '$\tau$'
        value: '30.462(46) ns\cite{Steck25}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '5.225(8) MHz\cite{Steck25}'

  - id: 7S1/2
    j: 0.5
    energy: '555.681179924(?) THz\cite{NISTCsI}'
    notation: '$7s\,{}^{2}S_{1/2}$'
    references:
      energy: [NISTCsI]
      constants: [Yang16]
      gJCalculation: [Foot05]
      gFCalculation: [Foot05]
    hyperfine_constants:
      a: '545.818(9) MHz\cite{Yang16}'
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '48.28(7) ns\cite{Toh18}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '3.296(5) MHz\cite{Toh18}'

  - id: 7P1/2
    j: 0.5
    energy: '652.508717615(?) THz\cite{NISTCsI}'
    notation: '$7p\,{}^{2}P_{1/2}$'
    references:
      energy: [NISTCsI]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '165.21(19) ns\cite{Toh19}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '0.9633(11) MHz\cite{Toh19}'

  - id: 7P3/2
    j: 1.5
    energy: '657.936430087(?) THz\cite{NISTCsI}'
    notation: '$7p\,{}^{2}P_{3/2}$'
    references:
      energy: [NISTCsI]
      gJCalculation: [Foot05]
    properties:
      - section: Lifetime
      - label: '$\tau$'
        value: '137.54(16) ns\cite{Toh19}'
      - label: '$\frac{\Gamma}{2\pi}$'
        value: '1.1572(13) MHz\cite{Toh19}'

transitions:
  - between: ['6S1/2[F=3]', '6S1/2[F=4]']
    type: M1
    frequency: '9.192631770 GHz\cite{BIPM25}'
    show: [frequency]
    notes:
      - 'Unperturbed ground-state hyperfine transition defining the SI second.\cite{BIPM25}'

  - between: ['6S1/2[F=3,mF=0]', '6S1/2[F=4,mF=0]']
    type: M1
    frequency: '9.192631770 GHz\cite{BIPM25}'
    show: [frequency, type]
    notes:
      - 'First-order field-insensitive clock branch in the low-field limit.\cite{BIPM25}'

  - between: [6S1/2, 6P1/2]
    type: E1
    strength: '3.1869(41) ea0\cite{Steck25}'
    frequency: '335.1160487481(24) THz\cite{Gerginov06}'
    show: [wavelength, type]
    notes:
      - 'Cesium D1 line near 894.6 nm; widely used for optical pumping and Raman work.'

  - between: ['6S1/2[F=3]', '6P1/2[F=3]']
    type: E1
    strength: '1/4\cite{Steck25}'

  - between: ['6S1/2[F=3]', '6P1/2[F=4]']
    type: E1
    strength: '3/4\cite{Steck25}'

  - between: ['6S1/2[F=4]', '6P1/2[F=3]']
    type: E1
    strength: '7/12\cite{Steck25}'

  - between: ['6S1/2[F=4]', '6P1/2[F=4]']
    type: E1
    strength: '5/12\cite{Steck25}'

  - between: [6S1/2, 6P3/2]
    type: E1
    strength: '4.4837(57) ea0\cite{Steck25}'
    frequency: '351.72571850(11) THz\cite{Udem00}'
    show: [wavelength, type]
    notes:
      - 'Cesium D2 line near 852.3 nm; canonical laser-cooling transition.'

  - between: ['6S1/2[F=3]', '6P3/2[F=2]']
    type: E1
    strength: '5/14\cite{Steck25}'

  - between: ['6S1/2[F=3]', '6P3/2[F=3]']
    type: E1
    strength: '3/8\cite{Steck25}'

  - between: ['6S1/2[F=3]', '6P3/2[F=4]']
    type: E1
    strength: '15/56\cite{Steck25}'
    notes:
      - 'Canonical D2 repump branch in standard cesium cooling schemes.'

  - between: ['6S1/2[F=4]', '6P3/2[F=3]']
    type: E1
    strength: '7/72\cite{Steck25}'

  - between: ['6S1/2[F=4]', '6P3/2[F=4]']
    type: E1
    strength: '7/24\cite{Steck25}'

  - between: ['6S1/2[F=4]', '6P3/2[F=5]']
    type: E1
    strength: '11/18\cite{Steck25}'
    notes:
      - 'Canonical D2 cooling branch.'

  - between: ['6S1/2[F=4,mF=4]', '6P3/2[F=5,mF=5]']
    type: E1
    notes:
      - 'Stretched $\sigma^+$ D2 cycling branch.'

  - between: [6P1/2, 7S1/2]
    type: E1
    frequency: '220.565131176(?) THz\cite{NISTCsI,Gerginov06}'
    show: [wavelength, type]
    notes:
      - 'Telecom ladder line near 1359.2 nm.'

  - between: [6P3/2, 7S1/2]
    type: E1
    frequency: '203.955461424(?) THz\cite{NISTCsI,Udem00}'
    show: [wavelength, type]
    notes:
      - 'Telecom ladder line near 1469.9 nm.'

  - between: [6S1/2, 7S1/2]
    type: '2E1'
    frequency: '555.681179924(?) THz\cite{NISTCsI}'
    show: [frequency, type]
    notes:
      - 'Degenerate two-photon excitation uses 1079.008859 nm light.'
      - 'Canonical cesium atomic-parity-violation transition.\cite{Wood97}'

  - between: [6S1/2, 7P1/2]
    type: E1
    frequency: '652.508717615(?) THz\cite{NISTCsI}'
    show: [wavelength, type]
    notes:
      - 'Blue excitation line near 459.45 nm.'

  - between: [6S1/2, 7P3/2]
    type: E1
    frequency: '657.936430087(?) THz\cite{NISTCsI}'
    show: [wavelength, type]
    notes:
      - 'Blue excitation line near 455.66 nm.'

